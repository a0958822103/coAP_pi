<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>充放電機控制面板</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f9; padding: 0px; margin: 0 }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h1 { color: #333; border-bottom: 2px solid #007bff; padding-bottom: 10px; }
        
        .dashboard { display: flex; gap: 20px; margin-top: 20px; }
        .data-box { flex: 1; background: #e9ecef; padding: 20px; border-radius: 8px; text-align: center; }
        .data-value { font-size: 2.5em; font-weight: bold; margin-top: 10px; }
        
        .control-panel { margin-top: 30px; padding-top: 20px; border-top: 1px dashed #ccc; }
        button { padding: 10px 20px; font-size: 1.1em; border: none; border-radius: 5px; cursor: pointer; background: #007bff; color: white; margin-right: 10px; }
        button:hover { background: #0056b3; }
        

        .navbar {
            background-color: #343a40;
            padding: 15px 25px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            flex-shrink: 0; /* 防止導覽列被壓縮 */
        }
        .navbar-brand { font-size: 1.5em; font-weight: bold; margin: 0; display: flex; align-items: center; gap: 10px; }
        .nav-links { display: flex; gap: 15px; }
        .nav-links a {
            color: #adb5bd;
            text-decoration: none;
            font-size: 1.1em;
            padding: 8px 15px;
            border-radius: 5px;
            transition: all 0.3s;
            font-weight: bold;
        }
        .nav-links a:hover { color: white; background-color: #495057; }
        .nav-links a.active { color: white; background-color: #007bff; } 
    </style>
</head>
<body>

<nav class="navbar">
    <div class="navbar-brand">電池監控系統</div>
    <div class="nav-links">
        <a href="/" >ESP32 監控中心</a>
        <a href="/charger" class="active">充放電機控制面板</a>
    </div>
</nav>

<div class="container">
    <h1>ThinkPower 充放電機控制面板</h1>
    
    <div style="text-align: right; color: #666;">
        設備狀態: <strong id="dev-status" style="color: gray;">連線中...</strong>
    </div>

    <div class="dashboard">
        <div class="data-box">
            <div style="font-size: 1.2em; color: #555;">即時電壓 (mV)</div>
            <div class="data-value" id="val-volt" style="color: #007bff;">--</div>
        </div>
        <div class="data-box">
            <div style="font-size: 1.2em; color: #555;">即時電流 (mA)</div>
            <div class="data-value" id="val-curr" style="color: #dc3545;">--</div>
        </div>
    </div>

    <div class="control-panel">
        <h3>控制指令</h3>
        <button onclick="sendCommand('OUTP ON')">開啟輸出 (ON)</button>
        <button onclick="sendCommand('OUTP OFF')" style="background: #dc3545;">關閉輸出 (OFF)</button>
        <button onclick="sendCommand('*IDN?')" style="background: #28a745;">查詢設備資訊</button>        
    </div>
</div>

<script>
    // 1. 定期抓取儀器數據 (每 2 秒更新一次)
    function fetchChargerData() {
        fetch('/api/charger/data')
            .then(response => {
                if (!response.ok) throw new Error("設備離線");
                return response.json();
            })
            .then(data => {
                document.getElementById('dev-status').innerText = "連線正常 🟢";
                document.getElementById('dev-status').style.color = "green";
                document.getElementById('val-volt').innerText = data.volt;
                document.getElementById('val-curr').innerText = data.curr;
            })
            .catch(error => {
                document.getElementById('dev-status').innerText = "連線失敗 🔴";
                document.getElementById('dev-status').style.color = "red";
                document.getElementById('val-volt').innerText = "--";
                document.getElementById('val-curr').innerText = "--";
            });
    }

    // 2. 發送控制指令
    function sendCommand(cmd) {
        fetch(`/api/charger/cmd?cmd=${encodeURIComponent(cmd)}`)
            .then(res => res.json())
            .then(data => {
                alert(`指令已發送。\n儀器回應: ${data.response}`);
            });
    }

    // 網頁載入後，立刻抓取一次資料，然後每 2000 毫秒(2秒)抓一次
    fetchChargerData();
    setInterval(fetchChargerData, 2000);
</script>

</body>
</html>
